name: build-windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Tauri app (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (NSIS + MSI)
        run: bun run build:win
        env:
          CI: 'true'

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/ 2>/dev/null || true
          find src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.nsis.zip" \) 2>/dev/null

      - name: Upload NSIS installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: printer-monitor-windows-nsis
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MSI installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: printer-monitor-windows-msi
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30
