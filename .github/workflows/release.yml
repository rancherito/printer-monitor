name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a partir de la versión del tauri.conf.json (ej. v0.1.0)'
        required: false
        default: ''

jobs:
  release-windows:
    name: Release Tauri app (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
          echo "Using tag: ${TAG}"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG }}
          releaseName: 'Printer Monitor ${{ env.TAG }}'
          releaseBody: 'Ver los assets para descargar e instalar esta versión.'
          releaseDraft: true
          prerelease: false
          projectPath: .
          tauriScript: bun run build:win
          args: '--target x86_64-pc-windows-msvc --bundles nsis,msi'
